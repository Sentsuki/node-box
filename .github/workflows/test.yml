name: Dev Build and Artifact

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
          - goos: linux
            goarch: arm64
            platform: linux-arm64
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Build Go Binary (${{ matrix.platform }})
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o node-box ./cmd/node-box
          
      - name: Create Tar Archive
        run: |
          tar -czf node-box-${{ matrix.platform }}.tar.gz node-box
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-node-box-${{ matrix.platform }}
          path: node-box-${{ matrix.platform }}.tar.gz
          retention-days: 3